<meta name='viewport' content='width=device-width, initial-scale=1'/><meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"/>
<title>Neon Jet: MS Premium</title>
<style>
  /* --- RESET --- */
  * { margin:0; padding:0; box-sizing:border-box; user-select: none; -webkit-user-select: none; }
  
  html, body { 
    width:100%; height:100%; 
    background-color: #030008; /* Deep Space Dark Purple/Black */
    overflow:hidden; 
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    touch-action: none; 
  }

  /* CANVAS */
  canvas { display:block; position: absolute; top:0; left:0; z-index: 1; }
  
  /* --- UI LAYERS --- */
  #uiLayer {
    position: absolute; top:0; left:0; width:100%; height:100%; z-index: 10;
    pointer-events: none; 
  }

  /* MUTE BUTTON */
  #muteBtn {
    position: absolute; top: 20px; right: 20px;
    font-size: 24px; cursor: pointer; pointer-events: auto;
    width: 45px; height: 45px; line-height: 45px; text-align: center;
    background: rgba(255, 255, 255, 0.05); border-radius: 50%;
    border: 1px solid rgba(0, 238, 255, 0.4);
    color: #fff; z-index: 20;
    box-shadow: 0 0 15px rgba(0,238,255,0.2);
    backdrop-filter: blur(8px);
    transition: transform 0.2s, background 0.2s;
  }
  #muteBtn:active { transform: scale(0.9); background: rgba(0, 238, 255, 0.2); }

  /* PREMIUM LOADING SCREEN */
  #loadingScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, #110022 0%, #000000 100%);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 100; pointer-events: auto;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .ms-logo {
    font-size: 65px; font-weight: 900; color: #fff; letter-spacing: -2px;
    text-shadow: 0 0 20px #00eeff, 0 0 40px #0000ff;
    animation: pulseLogo 2s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
  }

  .loader-container {
    width: 280px; height: 8px; background: rgba(255,255,255,0.1); margin-top: 40px;
    border-radius: 20px; overflow: hidden; position: relative;
    box-shadow: 0 0 15px rgba(0,238,255,0.3) inset;
  }

  .loader-bar {
    width: 0%; height: 100%; 
    background: linear-gradient(90deg, #00eeff, #0055ff, #00eeff);
    background-size: 200% 100%;
    animation: loadProgress 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards, gradientShift 2s infinite linear;
    border-radius: 20px;
  }

  .loading-text {
    margin-top: 20px; color: #00ffff; font-size: 13px; letter-spacing: 5px;
    text-transform: uppercase; animation: blink 1.5s infinite; opacity: 0.8;
  }

  /* GAME OVER SCREEN */
  #gameOverScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 5, 0.9);
    display: none; flex-direction: column; justify-content: center; align-items: center;
    z-index: 30; pointer-events: auto;
    backdrop-filter: blur(12px);
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    padding: 20px;
    text-align: center; /* Ensures everything inside is centered */
  }

  /* CENTERED AND FIXED RED TEXT */
  .game-over-text {
    font-size: 48px; /* Slightly smaller to fit mobile screens perfectly */
    color: #ff0044; 
    font-weight: 900; 
    text-shadow: 0 0 20px #ff0044, 0 0 40px #aa0022; 
    margin-bottom: 20px; 
    text-transform: uppercase;
    letter-spacing: 4px;
    text-align: center;
    line-height: 1.1;
  }

  .score-container {
    background: rgba(255,255,255,0.05); padding: 15px 40px; border-radius: 15px;
    text-align: center; border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    margin-bottom: 10px;
    min-width: 250px;
  }

  #finalScore { color:#fff; font-size:28px; font-weight:bold; text-shadow: 0 0 10px #fff; }
  #bestScoreText { color:#ffdd00; font-size:16px; margin-top:5px; text-shadow: 0 0 10px #ffdd00; font-weight:600; letter-spacing: 1px;}

  /* PROFESSIONAL AD CARD */
  .ad-card {
    background: rgba(0, 238, 255, 0.03);
    border: 1px solid rgba(0, 238, 255, 0.2);
    border-radius: 15px;
    padding: 10px;
    margin: 15px auto 25px auto; /* Auto margins to keep it dead center */
    box-shadow: 0 0 25px rgba(0, 238, 255, 0.1);
    display: flex; justify-content: center; align-items: center;
    overflow: hidden; position: relative;
    max-width: 100%;
  }
  
  .ad-card::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: conic-gradient(transparent, rgba(0,238,255,0.3), transparent 30%);
    animation: rotateAdGlow 4s linear infinite; z-index: -1;
  }
  .ad-card::after {
    content: ''; position: absolute; inset: 2px; background: #050508; border-radius: 13px; z-index: -1;
  }

  @media (max-width: 768px) {
    .ad-card { transform: scale(0.48); margin: -30px auto; }
  }

  button.retry-btn {
    padding: 16px 50px; font-size: 20px; font-weight: 900;
    background: linear-gradient(45deg, #00eeff, #0055ff);
    color: #fff; border: none; border-radius: 50px;
    box-shadow: 0 8px 20px rgba(0, 119, 255, 0.4); cursor: pointer;
    text-transform: uppercase; transition: all 0.2s ease;
    letter-spacing: 2px;
    margin-top: 15px;
  }
  button.retry-btn:active { transform: translateY(4px) scale(0.95); box-shadow: 0 4px 10px rgba(0, 119, 255, 0.4); }

  /* HUD */
  #hudContainer { position:absolute; top:20px; left:20px; }
  #scoreBoard { font-size:26px; font-weight:900; color:#fff; font-style: italic; text-shadow:0 0 15px #00ffff; }
  #highScoreBoard { font-size:14px; font-weight:700; color:#ffdd00; text-transform: uppercase; letter-spacing: 1px; text-shadow:0 0 10px #ffdd00; margin-top: 5px; }

  #footer {
    position:absolute; bottom:15px; width:100%; text-align:center; 
    font-size:11px; color:rgba(255,255,255,0.2); z-index: 5; text-transform: uppercase; letter-spacing: 3px;
  }

  /* Animations */
  @keyframes pulseLogo { 0% { transform: scale(1); filter: hue-rotate(0deg); } 100% { transform: scale(1.05); filter: hue-rotate(30deg); } }
  @keyframes loadProgress { 0% { width: 0%; } 100% { width: 100%; } }
  @keyframes gradientShift { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
  @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes rotateAdGlow { 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

<img id="playerImg" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhSVKBSSZZZ9r8sIxAVEy8U2og9ihQN9HaKLVME0kzLdqIn3j83y2XgWuac6Eegsbiu5_TG74hVkl33oyC2X8RCqCrHKlYYq1Wd7mm5MaG6EW-FxsXTJunZ6cnD3nYkGm2pZGoqEX21frYF8N5ipJvfrIC6sewbPd0SBurzPzccsZ7IxBr9X9cUsHnG5so/s1600/1000480764.png" style="display:none;" />

<canvas id="gameCanvas"></canvas>

<div id="uiLayer">
    <div id="hudContainer">
        <div id="scoreBoard">0000</div>
        <div id="highScoreBoard">BEST: 0</div>
    </div>
    <div id="muteBtn" onclick="toggleMute()">🔕</div>
</div>

<div id="loadingScreen">
    <div class="ms-logo">MS GAMES</div>
    <div class="loader-container"><div class="loader-bar"></div></div>
    <div class="loading-text">Initializing Systems...</div>
</div>

<div id="gameOverScreen">
    <!-- TEXT IS NOW GAME OVER AND PERFECTLY CENTERED -->
    <div class="game-over-text">GAME OVER</div>
    
    <div class="score-container">
        <div id="finalScore">Score: 0</div>
        <div id="bestScoreText">Best: 0</div>
    </div>
    
    <!-- PROFESSIONAL AD CARD CONTAINER (UNTOUCHED CODE) -->
    <div class="ad-card">
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1874063367142441"
             crossorigin="anonymous"></script>
        <!-- Ms -->
        <ins class="adsbygoogle"
             style="display:inline-block;width:728px;height:90px"
             data-ad-client="ca-pub-1874063367142441"
             data-ad-slot="9832164119"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <!-- BUTTON UPDATED -->
    <button class="retry-btn" onclick="restartGame()">RETRY</button>
</div>

<div id="footer">Designed by ᗰᑌᔕTᗩᑫEEᗰ</div>

<script>
/* --- 1. AUDIO SYSTEM --- */
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();
let bgmOscillators = [];
let isMuted = true; 
let audioUnlocked = false;

function createNoiseBuffer() {
    const bufferSize = audioCtx.sampleRate * 2; 
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
    return buffer;
}
const noiseBuffer = createNoiseBuffer();

function toggleMute() {
    isMuted = !isMuted;
    const btn = document.getElementById('muteBtn');
    if(!isMuted) {
        btn.innerText = "🔊";
        if(gameRunning) startMusic();
    } else {
        btn.innerText = "🔕";
        stopMusic();
    }
}

function unlockAudio() {
    if(!audioUnlocked) {
        audioCtx.resume().then(() => {
            audioUnlocked = true;
            if(!isMuted && gameRunning) startMusic();
        });
    }
}

function playBlastSound(type = 'enemy') {
    if(isMuted) return;
    if(audioCtx.state === 'suspended') audioCtx.resume();
    
    const noise = audioCtx.createBufferSource();
    noise.buffer = noiseBuffer;
    const noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'lowpass'; noiseFilter.frequency.value = type === 'player' ? 500 : 1500;
    const noiseGain = audioCtx.createGain();
    
    noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
    noiseGain.gain.setValueAtTime(type === 'player' ? 1.5 : 0.5, audioCtx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (type === 'player' ? 0.8 : 0.3));
    noise.start(); noise.stop(audioCtx.currentTime + 1);
}

function startMusic() {
    stopMusic(); 
    if(isMuted) return;
    if(audioCtx.state === 'suspended') audioCtx.resume();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth'; osc.frequency.value = 55; 
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 600;

    osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    
    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine'; lfo.frequency.value = 3; 
    const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 400;
    lfo.connect(lfoGain); lfoGain.connect(filter.frequency); lfo.start();
    
    gain.gain.value = 0.2; 
    osc.start();
    bgmOscillators.push(osc, lfo);
}

function stopMusic() { bgmOscillators.forEach(o => o.stop()); bgmOscillators = []; }

/* --- 2. GAME ENGINE --- */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const loadingScreen = document.getElementById("loadingScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const scoreEl = document.getElementById("scoreBoard");
const highScoreEl = document.getElementById("highScoreBoard");
const playerImg = document.getElementById("playerImg");

let width, height;
let player = { x:0, y:0, w:65, h:65 };
let bullets = [], enemies = [], particles = [], nebulas = [], stars = [], floatingTexts = [];
let score = 0, gameRunning = false, frameCount = 0;
let screenShake = 0;
let highScore = localStorage.getItem("msPremiumHighScore") || 0; 

// LOADING LOGIC
window.onload = function() {
    resize();
    createNebula();
    createStars();
    highScoreEl.innerText = "BEST: " + String(highScore).padStart(4, '0');
    
    setTimeout(() => {
        loadingScreen.style.transform = 'scale(1.1)';
        loadingScreen.style.opacity = '0';
        setTimeout(() => {
            loadingScreen.style.display = 'none';
            isMuted = false; document.getElementById('muteBtn').innerText = "🔊";
            startGame();
        }, 800);
    }, 3500);
};

function resize() {
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width; canvas.height = height;
    player.y = height - 120; player.x = width / 2 - player.w / 2;
}
window.addEventListener('resize', resize);

function createStars() {
    stars = [];
    for(let i=0; i<80; i++) {
        stars.push({
            x: Math.random() * width, y: Math.random() * height,
            size: Math.random() * 2.5 + 0.5, speed: Math.random() * 3 + 1,
            opacity: Math.random()
        });
    }
}

function createNebula() {
    nebulas = [];
    for(let i=0; i<6; i++) {
        nebulas.push({
            x: Math.random() * width, y: Math.random() * height,
            r: Math.random() * 250 + 150,
            color: Math.random() > 0.5 ? 'rgba(0, 80, 255, 0.05)' : 'rgba(200, 0, 255, 0.05)',
            vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3
        });
    }
}

function startGame() {
    gameOverScreen.style.display = 'none';
    score = 0; updateScore();
    bullets = []; enemies = []; particles = []; floatingTexts = [];
    frameCount = 0; screenShake = 0;
    
    if(width) { player.x = width/2 - player.w/2; player.y = height - 120; }
    gameRunning = true; gameLoop();
}

function restartGame() {
    startGame();
    if(audioUnlocked && !isMuted) startMusic();
}

function updateScore() {
    scoreEl.innerText = String(score).padStart(4, '0');
}

function gameOver() {
    gameRunning = false; stopMusic(); playBlastSound('player');
    screenShake = 25; // Big shake
    
    document.getElementById("finalScore").innerText = "Score: " + score;
    document.getElementById("bestScoreText").innerText = "Best: " + highScore;
    
    setTimeout(() => { gameOverScreen.style.display = 'flex'; }, 800);
}

function spawnEnemy() {
    let size = Math.random() * 20 + 35;
    let spawnX = Math.random() * (width - size);
    enemies.push({ x: spawnX, y: -50, w: size, h: size, speed: 4 + (score * 0.015), hp: size > 45 ? 2 : 1 });
}

function createExplosion(x, y, color, count=20) {
    for(let i=0; i<count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12,
            life: 1.0, color: color, size: Math.random() * 4 + 2
        });
    }
}

function addFloatingText(x, y, text) {
    floatingTexts.push({ x: x, y: y, text: text, life: 1.0 });
}

function gameLoop() {
    if(!gameRunning && particles.length === 0 && screenShake === 0) return; // Keep rendering explosions/shake

    ctx.fillStyle = "#030008"; ctx.fillRect(0, 0, width, height);

    // Screen Shake apply
    ctx.save();
    if(screenShake > 0) {
        let dx = (Math.random() - 0.5) * screenShake;
        let dy = (Math.random() - 0.5) * screenShake;
        ctx.translate(dx, dy);
        screenShake *= 0.9; // decay
        if(screenShake < 0.5) screenShake = 0;
    }

    // Galaxy/Nebula
    nebulas.forEach(n => {
        n.x += n.vx; n.y += n.vy;
        if(n.x > width + n.r) n.x = -n.r; if(n.x < -n.r) n.x = width + n.r;
        if(n.y > height + n.r) n.y = -n.r; if(n.y < -n.r) n.y = height + n.r;
        const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
        g.addColorStop(0, n.color); g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2); ctx.fill();
    });

    // Parallax Stars
    stars.forEach(s => {
        s.y += s.speed;
        if(s.y > height) { s.y = 0; s.x = Math.random() * width; }
        ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
    });

    if(gameRunning) {
        // Player Thruster Particles
        if(frameCount % 2 === 0) {
            particles.push({
                x: player.x + player.w/2 + (Math.random()-0.5)*10, y: player.y + player.h - 5,
                vx: (Math.random() - 0.5) * 2, vy: Math.random() * 5 + 3,
                life: 0.6, color: "#00eeff", size: Math.random() * 3 + 2
            });
        }

        // Draw Player
        ctx.shadowBlur = 25; ctx.shadowColor = "#00eeff";
        ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);
        ctx.shadowBlur = 0;

        // Bullets
        if(frameCount % 7 === 0) bullets.push({ x: player.x+player.w/2-3, y: player.y, w: 6, h: 25 });
    }

    // Draw & Move Bullets
    ctx.fillStyle = "#fff"; ctx.shadowBlur = 15; ctx.shadowColor = "#00ff88";
    for(let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i]; b.y -= 25;
        ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 3); ctx.fill();
        if(b.y < -50) bullets.splice(i, 1);
    }
    ctx.shadowBlur = 0;

    if(gameRunning) {
        // Enemies
        if(frameCount % Math.max(20, 40 - Math.floor(score/50)) === 0) spawnEnemy();
        for(let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i]; e.y += e.speed;
            
            // Draw Enemy (Neon Pulsing Octagon)
            let pulse = Math.abs(Math.sin(frameCount * 0.1));
            ctx.shadowBlur = 15 + (pulse * 10); ctx.shadowColor = "#ff0044";
            ctx.fillStyle = "#110000"; ctx.strokeStyle = "#ff0044"; ctx.lineWidth = 3;
            
            ctx.beginPath();
            ctx.arc(e.x + e.w/2, e.y + e.h/2, e.w/2, 0, Math.PI*2);
            ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#ff0044"; ctx.globalAlpha = 0.5 + (pulse * 0.5);
            ctx.arc(e.x + e.w/2, e.y + e.h/2, e.w/4, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;

            // Collision: Player
            if(e.x < player.x+player.w-10 && e.x+e.w > player.x+10 && e.y < player.y+player.h-10 && e.y+e.h > player.y+10) {
                createExplosion(player.x+player.w/2, player.y+player.h/2, "#00eeff", 50);
                gameOver();
            }

            // Collision: Bullet
            for(let j = bullets.length - 1; j >= 0; j--) {
                let b = bullets[j];
                if(b.x < e.x+e.w && b.x+b.w > e.x && b.y < e.y+e.h && b.y+b.h > e.y) {
                    playBlastSound('enemy');
                    createExplosion(b.x, b.y, "#ffdd00", 10);
                    e.hp--;
                    bullets.splice(j, 1);
                    
                    if(e.hp <= 0) {
                        createExplosion(e.x+e.w/2, e.y+e.h/2, "#ff0044", 25);
                        addFloatingText(e.x, e.y, "+10");
                        enemies.splice(i, 1);
                        score += 10; updateScore();
                        screenShake = 3; // Micro shake on kill
                        
                        if(score > highScore) {
                            highScore = score;
                            localStorage.setItem("msPremiumHighScore", highScore);
                            highScoreEl.innerText = "BEST: " + String(highScore).padStart(4, '0');
                        }
                    }
                    break;
                }
            }
            if(e.y > height + 100) enemies.splice(i, 1);
        }
    }

    // Render Particles
    for(let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.03;
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        if(p.life <= 0) particles.splice(i, 1);
    }
    
    // Render Floating Text
    ctx.font = "bold 20px Arial"; ctx.textAlign = "center";
    for(let i = floatingTexts.length - 1; i >= 0; i--) {
        let ft = floatingTexts[i];
        ft.y -= 1.5; ft.life -= 0.02;
        ctx.fillStyle = `rgba(0, 255, 136, ${ft.life})`;
        ctx.fillText(ft.text, ft.x, ft.y);
        if(ft.life <= 0) floatingTexts.splice(i, 1);
    }

    ctx.globalAlpha = 1.0; ctx.restore(); // Restore shake transform
    frameCount++;
    requestAnimationFrame(gameLoop);
}

// CONTROLS
document.addEventListener("touchstart", (e) => {
    unlockAudio();
    if(gameRunning) player.x = e.touches[0].clientX - player.w/2;
}, { passive: false });

document.addEventListener("touchmove", (e) => {
    e.preventDefault();
    if(gameRunning) {
        let t = e.touches[0].clientX;
        player.x = t - player.w / 2;
        if(player.x < 0) player.x = 0;
        if(player.x > width - player.w) player.x = width - player.w;
    }
}, { passive: false });
</script>
</body>
</html>
