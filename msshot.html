<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"/>
<title>Neon Jet: MS Premium</title>
<style>
  /* --- RESET --- */
  * { margin:0; padding:0; box-sizing:border-box; user-select: none; -webkit-user-select: none; }
  
  html, body { 
    width:100%; height:100%; 
    background-color: #000;
    overflow:hidden; 
    font-family:'Segoe UI', sans-serif; 
    touch-action: none; 
  }

  /* CANVAS */
  canvas { display:block; position: absolute; top:0; left:0; z-index: 1; }
  
  /* --- UI LAYERS --- */
  #uiLayer {
    position: absolute; top:0; left:0; width:100%; height:100%; z-index: 10;
    pointer-events: none; 
  }

  /* MUTE BUTTON */
  #muteBtn {
    position: absolute; top: 20px; right: 20px;
    font-size: 28px; cursor: pointer; pointer-events: auto;
    width: 50px; height: 50px; line-height: 50px; text-align: center;
    background: rgba(255, 255, 255, 0.1); border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff; z-index: 20;
    text-shadow: 0 0 10px #00ffff;
    backdrop-filter: blur(5px);
  }

  /* PREMIUM LOADING SCREEN */
  #loadingScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 100; pointer-events: auto;
    transition: opacity 1s ease;
  }

  .ms-logo {
    font-size: 60px; font-weight: 900; color: #fff; letter-spacing: -2px;
    text-shadow: 0 0 20px #00eeff, 0 0 40px #0000ff;
    animation: glow 1.5s infinite alternate;
  }

  .loader-container {
    width: 250px; height: 6px; background: #333; margin-top: 30px;
    border-radius: 10px; overflow: hidden; position: relative;
    box-shadow: 0 0 10px #00eeff;
  }

  .loader-bar {
    width: 0%; height: 100%; 
    background: linear-gradient(90deg, #00eeff, #0000ff);
    animation: loadProgress 3.5s linear forwards;
  }

  .loading-text {
    margin-top: 15px; color: #00ffff; font-size: 14px; letter-spacing: 4px;
    text-transform: uppercase; animation: blink 1s infinite;
  }

  @keyframes glow { 0% { opacity: 0.8; transform: scale(1); } 100% { opacity: 1; transform: scale(1.05); } }
  @keyframes loadProgress { 0% { width: 0%; } 100% { width: 100%; } }
  @keyframes blink { 50% { opacity: 0.5; } }

  /* GAME OVER SCREEN */
  #gameOverScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    display: none; flex-direction: column; justify-content: center; align-items: center;
    z-index: 30; pointer-events: auto;
    backdrop-filter: blur(5px);
  }

  .game-over-text {
    font-size: 50px; color: #ff0044; font-weight: 900; 
    text-shadow: 0 0 30px #ff0044; margin-bottom: 10px; text-transform: uppercase;
  }

  button.retry-btn {
    padding: 15px 50px; font-size: 22px; font-weight: bold;
    background: linear-gradient(90deg, #00eeff, #0077ff);
    color: #000; border: none; border-radius: 50px;
    box-shadow: 0 0 20px #00eeff; cursor: pointer;
    text-transform: uppercase;
  }

  /* HUD */
  #scoreBoard {
    position:absolute; top:20px; left:20px;
    font-size:24px; font-weight:900; color:#fff; font-style: italic;
    text-shadow:0 0 15px #00ffff;
  }

  #footer {
    position:absolute; bottom:15px; width:100%; text-align:center; 
    font-size:12px; color:rgba(255,255,255,0.3); z-index: 5; text-transform: uppercase; letter-spacing: 2px;
  }

</style>
</head>
<body>

<img id="playerImg" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhSVKBSSZZZ9r8sIxAVEy8U2og9ihQN9HaKLVME0kzLdqIn3j83y2XgWuac6Eegsbiu5_TG74hVkl33oyC2X8RCqCrHKlYYq1Wd7mm5MaG6EW-FxsXTJunZ6cnD3nYkGm2pZGoqEX21frYF8N5ipJvfrIC6sewbPd0SBurzPzccsZ7IxBr9X9cUsHnG5so/s1600/1000480764.png" style="display:none;" />

<canvas id="gameCanvas"></canvas>

<div id="uiLayer">
    <div id="scoreBoard">SCORE: 0</div>
    <div id="muteBtn" onclick="toggleMute()">🔕</div>
</div>

<div id="loadingScreen">
    <div class="ms-logo">MS GAMES</div>
    <div class="loader-container">
        <div class="loader-bar"></div>
    </div>
    <div class="loading-text">Loading Assets...</div>
</div>

<div id="gameOverScreen">
    <div class="game-over-text">GAME OVER</div>
    <div id="finalScore" style="color:#fff; font-size:20px; margin-bottom:20px;">Score: 0</div>
    
    <div id="myAdContainer" style="width: 100%; max-width: 320px; min-height: 250px; margin-bottom: 20px; border-radius: 10px; overflow: hidden; background: rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center;">
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1874063367142441" crossorigin="anonymous"></script>
        <ins class="adsbygoogle"
             style="display:block; width:100%;"
             data-ad-format="fluid"
             data-ad-layout-key="-fb+5w+4e-db+86"
             data-ad-client="ca-pub-1874063367142441"
             data-ad-slot="6461321358"></ins>
    </div>
    <button class="retry-btn" onclick="restartGame()">RETRY</button>
</div>

<div id="footer">Designed by ᗰᑌᔕTᗩᑫEEᗰ</div>

<script>
/* --- 1. AUDIO SYSTEM --- */
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();
let bgmOscillators = [];
let isMuted = true; // Start muted (icon state)
let audioUnlocked = false;

// Create Noise Buffer
function createNoiseBuffer() {
    const bufferSize = audioCtx.sampleRate * 2; 
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
    return buffer;
}
const noiseBuffer = createNoiseBuffer();

function toggleMute() {
    isMuted = !isMuted;
    const btn = document.getElementById('muteBtn');
    if(!isMuted) {
        btn.innerText = "🔊";
        if(gameRunning) startMusic();
    } else {
        btn.innerText = "🔕";
        stopMusic();
    }
}

function unlockAudio() {
    if(!audioUnlocked) {
        audioCtx.resume().then(() => {
            audioUnlocked = true;
            if(!isMuted && gameRunning) startMusic();
        });
    }
}

function playBlastSound() {
    if(isMuted) return;
    if(audioCtx.state === 'suspended') audioCtx.resume();
    
    // Noise
    const noise = audioCtx.createBufferSource();
    noise.buffer = noiseBuffer;
    const noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'lowpass'; noiseFilter.frequency.value = 1000;
    const noiseGain = audioCtx.createGain();
    noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
    noiseGain.gain.setValueAtTime(1, audioCtx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    noise.start(); noise.stop(audioCtx.currentTime + 0.5);

    // Kick
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = 'triangle'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    oscGain.gain.setValueAtTime(0.8, audioCtx.currentTime);
    oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    osc.connect(oscGain); oscGain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

function startMusic() {
    stopMusic(); 
    if(isMuted) return;
    if(audioCtx.state === 'suspended') audioCtx.resume();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth'; osc.frequency.value = 60; 
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 400;

    osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    
    const lfo = audioCtx.createOscillator();
    lfo.type = 'square'; lfo.frequency.value = 4; 
    const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 300;
    lfo.connect(lfoGain); lfoGain.connect(filter.frequency); lfo.start();
    
    gain.gain.value = 0.25; 
    osc.start();
    bgmOscillators.push(osc, lfo);
}

function stopMusic() {
    bgmOscillators.forEach(o => o.stop());
    bgmOscillators = [];
}

/* --- 2. GAME ENGINE --- */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const loadingScreen = document.getElementById("loadingScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const scoreEl = document.getElementById("scoreBoard");
const playerImg = document.getElementById("playerImg");

let width, height;
let player = { x:0, y:0, w:60, h:60 };
let bullets = [], enemies = [], particles = [], nebulas = [];
let score = 0, gameRunning = false, frameCount = 0;
let adLoaded = false; // Adsense tracking ke liye
let autoRetryTimeout; // Auto retry tracking ke liye

// LOADING LOGIC
window.onload = function() {
    resize();
    createNebula();
    
    // 3.5s Delay for Premium Loading
    setTimeout(() => {
        loadingScreen.style.opacity = '0';
        setTimeout(() => {
            loadingScreen.style.display = 'none';
            isMuted = false;
            document.getElementById('muteBtn').innerText = "🔊";
            startGame();
        }, 1000);
    }, 3500);
};

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    player.y = height - 100;
    player.x = width / 2 - player.w / 2;
}
window.addEventListener('resize', resize);

function createNebula() {
    nebulas = [];
    for(let i=0; i<10; i++) {
        nebulas.push({
            x: Math.random() * width, y: Math.random() * height,
            r: Math.random() * 200 + 100,
            color: Math.random() > 0.5 ? 'rgba(0, 50, 255, 0.1)' : 'rgba(150, 0, 255, 0.1)',
            vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2
        });
    }
}

function startGame() {
    gameOverScreen.style.display = 'none';
    score = 0;
    scoreEl.innerText = "SCORE: 0";
    bullets = [];
    enemies = [];
    particles = [];
    frameCount = 0;
    
    if(width) {
         player.x = width/2 - player.w/2;
         player.y = height - 100;
    }
    
    gameRunning = true;
    gameLoop();
}

function restartGame() {
    clearTimeout(autoRetryTimeout); // Agar button dabaya gaya toh timer cancel karo
    startGame();
    if(audioUnlocked && !isMuted) startMusic();
}

function gameOver() {
    gameRunning = false;
    stopMusic();
    playBlastSound();
    document.getElementById("finalScore").innerText = "Score: " + score;
    
    // Yahan "Game Over" screen visible hogi
    gameOverScreen.style.display = 'flex';
    
    // Adsense Request (Jab screen visible ho jaye, aur sirf pehli baar)
    if (!adLoaded) {
        try {
            (adsbygoogle = window.adsbygoogle || []).push({});
            adLoaded = true;
        } catch (e) {
            console.log("AdSense Error: ", e);
        }
    }

    // --- AUTO RETRY SYSTEM ---
    // Game over hone ke 3 seconds (3000ms) baad khud restart ho jayega
    autoRetryTimeout = setTimeout(() => {
        if(!gameRunning) {
            restartGame();
        }
    }, 3000); 
}

function spawnEnemy() {
    let spawnX = Math.random() * (width - 50);
    enemies.push({ x: spawnX, y: -50, w: 50, h: 50, speed: 5 + (score * 0.02) });
}

function createExplosion(x, y, color) {
    for(let i=0; i<20; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15,
            life: 1.0, color: color
        });
    }
}

function gameLoop() {
    if(!gameRunning) return;

    // Clear
    ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, width, height);

    // Galaxy
    nebulas.forEach(n => {
        n.x += n.vx; n.y += n.vy;
        if(n.x > width + n.r) n.x = -n.r; if(n.x < -n.r) n.x = width + n.r;
        if(n.y > height + n.r) n.y = -n.r; if(n.y < -n.r) n.y = height + n.r;
        const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
        g.addColorStop(0, n.color); g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2); ctx.fill();
    });

    // Stars
    ctx.fillStyle = "#fff";
    for(let i=0; i<30; i++) { 
        let sx = (Math.sin(frameCount*0.01 + i)*width + width)/2; 
        let sy = (frameCount * 2 + i * 50) % height;
        ctx.fillRect(sx, sy, 2, 2);
    }

    // Player
    ctx.shadowBlur = 20; ctx.shadowColor = "#00eeff";
    ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);
    ctx.shadowBlur = 0;

    // Bullets
    if(frameCount % 8 === 0) bullets.push({ x: player.x+27, y: player.y, w: 6, h: 20 });
    ctx.fillStyle = "#0f0"; ctx.shadowBlur = 10; ctx.shadowColor = "#0f0";
    for(let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i]; b.y -= 20;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        if(b.y < 0) bullets.splice(i, 1);
    }
    ctx.shadowBlur = 0;

    // Enemies
    if(frameCount % 30 === 0) spawnEnemy();
    for(let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i]; e.y += e.speed;
        const g = ctx.createRadialGradient(e.x+25, e.y+25, 5, e.x+25, e.y+25, 25);
        g.addColorStop(0, "#ff0044"); g.addColorStop(1, "#500");
        ctx.fillStyle = g; ctx.shadowBlur = 20; ctx.shadowColor = "#ff0044";
        ctx.beginPath(); ctx.arc(e.x+25, e.y+25, 25, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        // Collision: Player
        if(e.x < player.x+player.w && e.x+e.w > player.x && e.y < player.y+player.h && e.y+e.h > player.y) {
            createExplosion(player.x+30, player.y+30, "#00eeff");
            gameOver();
        }

        // Collision: Bullet
        for(let j = bullets.length - 1; j >= 0; j--) {
            let b = bullets[j];
            if(b.x < e.x+e.w && b.x+b.w > e.x && b.y < e.y+e.h && b.y+b.h > e.y) {
                playBlastSound(); 
                createExplosion(e.x+25, e.y+25, "#ff8800");
                enemies.splice(i, 1); bullets.splice(j, 1);
                score += 10; scoreEl.innerText = "SCORE: " + score;
                break;
            }
        }
        if(e.y > height) enemies.splice(i, 1);
    }

    // Particles
    for(let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.05;
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
        if(p.life <= 0) particles.splice(i, 1);
    }
    ctx.globalAlpha = 1.0;

    frameCount++;
    requestAnimationFrame(gameLoop);
}

// TOUCH (Start Audio & Move)
document.addEventListener("touchstart", (e) => {
    unlockAudio();
    if(gameRunning) player.x = e.touches[0].clientX - player.w/2;
}, { passive: false });

document.addEventListener("touchmove", (e) => {
    e.preventDefault();
    if(gameRunning) {
        let t = e.touches[0].clientX;
        player.x = t - player.w / 2;
        if(player.x < 0) player.x = 0;
        if(player.x > width - player.w) player.x = width - player.w;
    }
}, { passive: false });

</script>
</body>
</html>
