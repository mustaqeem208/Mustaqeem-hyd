<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"/>
<title>Neon Jet: MS Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  /* --- RESET --- */
  * { margin:0; padding:0; box-sizing:border-box; user-select: none; -webkit-user-select: none; }
  
  html, body { 
    width:100%; height:100%; 
    background-color: #030008; 
    overflow:hidden; 
    font-family:'Orbitron', sans-serif; 
    touch-action: none; 
  }

  /* CANVAS */
  canvas { display:block; position: absolute; top:0; left:0; z-index: 1; }
  
  /* --- UI LAYERS --- */
  #uiLayer {
    position: absolute; top:0; left:0; width:100%; height:100%; z-index: 10;
    pointer-events: none; 
  }

  /* MUTE BUTTON */
  #muteBtn {
    position: absolute; top: 20px; right: 20px;
    font-size: 24px; cursor: pointer; pointer-events: auto;
    width: 50px; height: 50px; line-height: 50px; text-align: center;
    background: rgba(0, 238, 255, 0.1); border-radius: 50%;
    border: 1px solid rgba(0, 238, 255, 0.5);
    color: #fff; z-index: 20;
    backdrop-filter: blur(5px);
  }

  /* PREMIUM LOADING SCREEN */
  #loadingScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, #1a0033 0%, #000000 100%);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 100; pointer-events: auto;
    transition: opacity 1s ease;
  }

  .ms-logo { font-size: 60px; font-weight: 900; color: #fff; text-shadow: 0 0 20px #00eeff; }
  .loader-container { width: 250px; height: 4px; background: rgba(255,255,255,0.1); margin-top: 40px; border-radius: 10px; overflow: hidden; }
  .loader-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00eeff, #ff00ff); animation: loadProgress 3.5s linear forwards; }
  .loading-text { margin-top: 15px; color: #00ffff; font-size: 12px; letter-spacing: 5px; animation: blink 1.5s infinite; }

  @keyframes loadProgress { 0% { width: 0%; } 100% { width: 100%; } }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* GAME OVER SCREEN */
  #gameOverScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    display: none; flex-direction: column; justify-content: center; align-items: center;
    z-index: 30; pointer-events: auto;
    backdrop-filter: blur(8px);
  }

  .game-over-text { font-size: 55px; color: #ff0044; font-weight: 900; text-shadow: 0 0 20px #ff0044; margin-bottom: 5px; }
  button.retry-btn { padding: 15px 60px; font-size: 20px; font-weight: bold; font-family: 'Orbitron', sans-serif; background: linear-gradient(45deg, #00eeff, #0055ff); color: #fff; border: none; border-radius: 50px; cursor: pointer; margin-top: 10px; }

  /* HUD */
  #scoreBoard { position:absolute; top:25px; left:20px; font-size:26px; font-weight:900; color:#fff; text-shadow: 0 0 10px #00ffff; }
  #footer { position:absolute; bottom:15px; width:100%; text-align:center; font-size:10px; color:rgba(255,255,255,0.4); z-index: 5; text-transform: uppercase; }
</style>
</head>
<body>

<img id="playerImg" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhSVKBSSZZZ9r8sIxAVEy8U2og9ihQN9HaKLVME0kzLdqIn3j83y2XgWuac6Eegsbiu5_TG74hVkl33oyC2X8RCqCrHKlYYq1Wd7mm5MaG6EW-FxsXTJunZ6cnD3nYkGm2pZGoqEX21frYF8N5ipJvfrIC6sewbPd0SBurzPzccsZ7IxBr9X9cUsHnG5so/s1600/1000480764.png" style="display:none;" />

<canvas id="gameCanvas"></canvas>

<div id="uiLayer">
    <div id="scoreBoard">SCORE: 0</div>
    <div id="muteBtn" onclick="toggleMute()">🔕</div>
</div>

<div id="loadingScreen">
    <div class="ms-logo">MS GAMES</div>
    <div class="loader-container"><div class="loader-bar"></div></div>
    <div class="loading-text">Initializing Systems...</div>
</div>

<div id="gameOverScreen">
    <div class="game-over-text">GAME OVER</div>
    <div id="finalScore" style="color:#00ffff; font-size:24px; font-weight:700; margin-bottom:25px;">Score: 0</div>
    
    <div id="myAdContainer" style="width: 100%; max-width: 320px; min-height: 250px; margin-bottom: 20px; border-radius: 12px; overflow: hidden; background: rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center;">
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1874063367142441" crossorigin="anonymous"></script>
        <ins class="adsbygoogle" style="display:block; width:100%;" data-ad-format="fluid" data-ad-layout-key="-fb+5w+4e-db+86" data-ad-client="ca-pub-1874063367142441" data-ad-slot="6461321358"></ins>
    </div>

    <button class="retry-btn" onclick="restartGame()">SYSTEM REBOOT</button>
</div>
<div id="footer">Designed by ᗰᑌᔕTᗩᑫEEᗰ</div>

<script>
/* --- 1. AUDIO SYSTEM --- */
const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();
let bgmOscillators = [];
let isMuted = true; 
let audioUnlocked = false;

function createNoiseBuffer() {
    const bufferSize = audioCtx.sampleRate * 2; 
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
    return buffer;
}
const noiseBuffer = createNoiseBuffer();

function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('muteBtn').innerText = isMuted ? "🔕" : "🔊";
    if(!isMuted && gameRunning) startMusic(); else stopMusic();
}

function unlockAudio() {
    if(!audioUnlocked) {
        audioCtx.resume().then(() => { audioUnlocked = true; if(!isMuted && gameRunning) startMusic(); });
    }
}

function playBlastSound() {
    if(isMuted || audioCtx.state === 'suspended') return;
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.4);
    oscGain.gain.setValueAtTime(0.8, audioCtx.currentTime);
    oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.connect(oscGain); oscGain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

function playShootSound() {
    if(isMuted || audioCtx.state === 'suspended') return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.05);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime); // reduced volume for fast fire
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.05);
}

function startMusic() { /* Keeping simple to avoid lag */ }
function stopMusic() {}

/* --- 2. GAME ENGINE --- */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("scoreBoard");
const playerImg = document.getElementById("playerImg");

let width, height;
let player = { x:0, y:0, w:64, h:64 };
let targetX = 0; 
let isTouching = false; // Fast fire trigger

let bullets = [], enemies = [], particles = [];
let stars = [];
let score = 0, gameRunning = false, frameCount = 0;
let adLoaded = false;
let screenShake = 0;

window.onload = function() {
    resize(); initStars();
    setTimeout(() => {
        document.getElementById("loadingScreen").style.display = 'none';
        isMuted = false; document.getElementById('muteBtn').innerText = "🔊";
        startGame();
    }, 3500);
};

function resize() {
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width; canvas.height = height;
    player.y = height - 120; player.x = width / 2 - player.w / 2; targetX = player.x;
}
window.addEventListener('resize', resize);

function initStars() {
    stars = [];
    for(let i=0; i<60; i++) stars.push({x: Math.random()*width, y: Math.random()*height, speed: Math.random()*2 + 1});
}

function startGame() {
    document.getElementById("gameOverScreen").style.display = 'none';
    score = 0; scoreEl.innerText = "SCORE: 0";
    bullets = []; enemies = []; particles = []; frameCount = 0; screenShake = 0;
    if(width) { player.x = width/2 - player.w/2; targetX = player.x; }
    gameRunning = true; gameLoop();
}

function restartGame() { startGame(); }

function gameOver() {
    gameRunning = false; playBlastSound(); screenShake = 20;
    document.getElementById("finalScore").innerText = "SCORE: " + score;
    setTimeout(() => {
        document.getElementById("gameOverScreen").style.display = 'flex';
        if (!adLoaded) { try { (adsbygoogle = window.adsbygoogle || []).push({}); adLoaded = true; } catch(e){} }
    }, 1000);
}

function spawnEnemy() {
    let size = 40 + Math.random() * 20;
    enemies.push({ 
        x: Math.random() * (width - size), y: -100, w: size, h: size, 
        speed: 3 + (score * 0.01) + Math.random(), angle: 0, rotSpeed: 0.05, hp: size > 50 ? 2 : 1
    });
}

function createExplosion(x, y, color) {
    for(let i=0; i<20; i++) {
        let ang = Math.random() * Math.PI * 2;
        particles.push({ x: x, y: y, vx: Math.cos(ang)*5, vy: Math.sin(ang)*5, life: 1, color: color });
    }
}

function gameLoop() {
    if(!gameRunning && particles.length === 0 && screenShake <= 0) return;

    // Fast clear screen (Removed expensive shadows/alpha blends for speed)
    ctx.fillStyle = "#030008"; ctx.fillRect(0, 0, width, height);

    ctx.save();
    if(screenShake > 0) { ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake); screenShake *= 0.8; }

    // Fast Stars
    ctx.fillStyle = "#fff";
    stars.forEach(s => {
        s.y += s.speed; if(s.y > height) { s.y = 0; s.x = Math.random() * width; }
        ctx.fillRect(s.x, s.y, 2, 2);
    });

    if(gameRunning) {
        player.x += (targetX - player.x) * 0.2; 
        
        // Fast Fake Glow
        ctx.fillStyle = "rgba(0, 238, 255, 0.2)";
        ctx.beginPath(); ctx.arc(player.x+32, player.y+32, 40, 0, Math.PI*2); ctx.fill();
        ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

        // RAPID FIRE LOGIC: Touch hai to har 4 frame me, nahi to har 12 frame me goli chalegi
        let fireRate = isTouching ? 4 : 12; 
        if(frameCount % fireRate === 0) {
            playShootSound();
            bullets.push({ x: player.x + 14, y: player.y + 10, w: 4, h: 30 }); 
            bullets.push({ x: player.x + player.w - 18, y: player.y + 10, w: 4, h: 30 });
        }
    }

    // Bullets Drawing
    ctx.fillStyle = "#ff00ff";
    for(let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i]; b.y -= 20;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        if(b.y < -50) bullets.splice(i, 1);
    }

    // Enemies & Collision (Fixed Hitbox)
    if(gameRunning && frameCount % 35 === 0) spawnEnemy();
    
    let px = player.x + player.w/2; // Player Center X
    let py = player.y + player.h/2; // Player Center Y
    let pRadius = 20; // Perfect circle hitbox for player (Side hits will now register)

    for(let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i]; e.y += e.speed; e.angle += e.rotSpeed;
        
        ctx.save(); ctx.translate(e.x + e.w/2, e.y + e.h/2); ctx.rotate(e.angle);
        ctx.strokeStyle = e.hp > 1 ? "#ff8800" : "#ff0044"; ctx.lineWidth = 3;
        ctx.strokeRect(-e.w/2, -e.h/2, e.w, e.h);
        ctx.fillStyle = "rgba(255,0,0,0.2)"; ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
        ctx.restore();

        if(!gameRunning) continue;

        let ex = e.x + e.w/2; // Enemy Center X
        let ey = e.y + e.h/2; // Enemy Center Y
        let eRadius = e.w/2;  // Enemy Hitbox

        // PERFECT CIRCLE COLLISION (For Jet Sides & Front)
        let dx = px - ex; let dy = py - ey;
        let distance = Math.sqrt(dx*dx + dy*dy);
        
        if(distance < pRadius + eRadius) {
            createExplosion(px, py, "#00eeff");
            player.x = -1000; gameOver();
        }

        // Bullet Hit
        for(let j = bullets.length - 1; j >= 0; j--) {
            let b = bullets[j];
            if(b.x < e.x+e.w && b.x+b.w > e.x && b.y < e.y+e.h && b.y+b.h > e.y) {
                bullets.splice(j, 1); e.hp--;
                if(e.hp <= 0) {
                    playBlastSound(); createExplosion(ex, ey, "#ff0044");
                    enemies.splice(i, 1); score += 10; scoreEl.innerText = "SCORE: " + score;
                }
                break;
            }
        }
        if(e.y > height + 50) enemies.splice(i, 1);
    }

    // Particles Drawing (Fast)
    for(let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.05;
        ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life);
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
        if(p.life <= 0) particles.splice(i, 1);
    }
    ctx.globalAlpha = 1.0; ctx.restore();
    frameCount++; requestAnimationFrame(gameLoop);
}

// Touch Controls (With HOLD to shoot fast tracking)
document.addEventListener("touchstart", (e) => {
    unlockAudio(); isTouching = true;
    if(gameRunning) targetX = e.touches[0].clientX - player.w/2;
}, { passive: false });

document.addEventListener("touchmove", (e) => {
    e.preventDefault();
    if(gameRunning) {
        targetX = e.touches[0].clientX - player.w/2;
        if(targetX < 0) targetX = 0; if(targetX > width - player.w) targetX = width - player.w;
    }
}, { passive: false });

document.addEventListener("touchend", () => {
    isTouching = false; // Hold finish
});

</script>
</body>
</html>
