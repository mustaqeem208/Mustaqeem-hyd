<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Pro | Mustaqeem Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #fccb90;
            --deep-gold: #d4af37;
            --bg: #020617;
            --card-bg: rgba(30, 41, 59, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, #1e293b 0%, transparent 40%),
                              radial-gradient(circle at 100% 100%, #0f172a 0%, transparent 40%);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
        }

        /* --- Admin Popup (Center Screen) --- */
        #adminPopup {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 10000; display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(10px);
        }
        .popup-card {
            width: 85%; max-width: 360px; background: #111827;
            border-radius: 30px; border: 1px solid var(--deep-gold);
            position: relative; overflow: hidden; animation: zoomIn 0.4s ease;
        }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .popup-card img { width: 100%; display: block; cursor: pointer; border-bottom: 2px solid var(--deep-gold); }
        .close-popup {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5);
            color: white; width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer;
        }

        /* --- Header --- */
        header { padding: 40px 25px 20px; text-align: left; }
        header h1 { font-size: 32px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        header span { color: var(--deep-gold); }
        .brand-text { font-size: 10px; letter-spacing: 4px; color: var(--deep-gold); font-weight: 800; margin-top: 5px; opacity: 0.8; }

        /* --- Custom Navigation Bar --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px);
            border: 1px solid var(--glass); border-radius: 25px;
            display: flex; justify-content: space-around; padding: 15px; z-index: 5000;
        }
        .nav-item { cursor: pointer; text-align: center; color: #94a3b8; font-size: 12px; font-weight: 600; }
        .nav-item.active { color: var(--deep-gold); }

        /* --- Grid Layout --- */
        .container { padding: 0 20px 120px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass); padding: 30px 20px; border-radius: 28px;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .card:active { transform: scale(0.95); background: rgba(255,255,255,0.05); }
        .card-num { position: absolute; right: -10px; bottom: -10px; font-size: 60px; font-weight: 900; opacity: 0.05; }
        .card-title { font-size: 18px; font-weight: 700; color: #f8fafc; }
        .card-sub { font-size: 11px; color: var(--deep-gold); letter-spacing: 1px; font-weight: 600; }

        /* --- Tasbeeh Overlay --- */
        #tasbeehOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 6000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .t-btn {
            width: 220px; height: 220px; border-radius: 50%;
            background: linear-gradient(145deg, #1e293b, #020617);
            border: 8px solid var(--deep-gold); display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 30px rgba(212,175,55,0.1);
        }
        .t-btn:active { transform: scale(0.92); }
        .t-count { font-size: 4rem; font-weight: 800; color: var(--deep-gold); margin: 0; }

        /* --- Player Overlay --- */
        #playerOverlay {
            position: fixed; inset: 0; background: rgba(2,6,23,0.98); z-index: 7000;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .player-disk { width: 100%; max-width: 320px; background: #111827; border-radius: 40px; border: 1px solid var(--glass); padding: 40px 20px; text-align: center; }
        audio { width: 100%; margin: 30px 0; filter: invert(1); }

        .btn-close { margin-top: 30px; background: white; color: black; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 800; cursor: pointer; }

        .footer-brand { margin: 40px 0; text-align: center; opacity: 0.4; }

        @media (max-width: 500px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div id="adminPopup">
    <div class="popup-card">
        <div class="close-popup" onclick="closePopup()">✕</div>
        <a href="https://wa.me/your-link-here" target="_blank">
            <img src="https://images.unsplash.com/photo-1590076215667-873d96c8ab13?auto=format&fit=crop&w=600&q=80" alt="Admin Ad">
        </a>
        <div style="padding: 15px; text-align: center;">
            <p style="margin: 0; font-size: 13px; color: var(--deep-gold); font-weight: 700;">ADMIN ANNOUNCEMENT</p>
            <p style="margin: 5px 0 0; font-size: 11px; color: #94a3b8;">Click the image to visit our link</p>
        </div>
    </div>
</div>

<header>
    <div class="brand-text">ᗰᑌᔕTᗩᑫEEᗰ DIGITAL</div>
    <h1>Quran <span>Pro</span></h1>
    <p style="color: #64748b; font-size: 14px; margin-top: 5px;">Listen to Holy Recitation</p>
</header>

<div class="container">
    <div class="grid" id="mainGrid"></div>
    <div class="footer-brand">
        <div class="brand-text">DESIGN BY ᗰᑌᔕTᗩᑫEEᗰ</div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="location.reload()">📖<br>Quran</div>
    <div class="nav-item" onclick="toggleTasbeeh(true)">📿<br>Tasbeeh</div>
    <div class="nav-item" onclick="shareApp()">📤<br>Share</div>
</div>

<div id="tasbeehOverlay">
    <h2 style="color: var(--deep-gold); letter-spacing: 2px;">TASBEEH COUNTER</h2>
    <div class="t-btn" onclick="vibrate(); countUp()">
        <span class="t-count" id="tDigit">0</span>
        <span style="font-size: 10px; color: #94a3b8; letter-spacing: 2px; margin-top: 10px;">TAP TO ZIKR</span>
    </div>
    <button class="btn-close" style="background:transparent; border:1px solid #334155; color:white;" onclick="resetCount()">RESET</button>
    <button class="btn-close" onclick="toggleTasbeeh(false)">BACK TO HOME</button>
    <div class="brand-text" style="margin-top: 40px;">ᗰᑌᔕTᗩᑫEEᗰ</div>
</div>

<div id="playerOverlay">
    <div class="player-disk">
        <div class="brand-text" style="margin-bottom: 20px;">NOW PLAYING</div>
        <h2 id="pTitle" style="font-size: 32px; color: var(--deep-gold); margin: 0;">Para 01</h2>
        <p style="color: #64748b; margin-bottom: 30px;">Digital Tilawat Library</p>
        <audio id="mainAudio" controls></audio>
        <div class="brand-text">DESIGN BY ᗰᑌᔕTᗩᑫEEᗰ</div>
    </div>
    <button class="btn-close" onclick="closePlayer()">CLOSE PLAYER</button>
</div>

<script>
    // Popup Close
    function closePopup() { document.getElementById('adminPopup').style.display = 'none'; }

    // Tasbeeh logic
    let counter = localStorage.getItem('tCount') || 0;
    document.getElementById('tDigit').innerText = counter;

    function countUp() {
        counter++;
        document.getElementById('tDigit').innerText = counter;
        localStorage.setItem('tCount', counter);
    }
    function resetCount() { counter = 0; document.getElementById('tDigit').innerText = 0; localStorage.setItem('tCount', 0); }
    function vibrate() { if(navigator.vibrate) navigator.vibrate(50); }
    function toggleTasbeeh(show) { document.getElementById('tasbeehOverlay').style.display = show ? 'flex' : 'none'; }

    // Quran Logic
    const links = ["2qpLHGY","2qnS2Ha","2sbSqoq","2r6TOeq","2qzzsYk","2qI4EE2","2rW88HS","2qK0aO4","2rBqzB0","2s3dkdd","2so5po5","2rzgVP9","2rSIJ1l","2sk5Lid","2rKJHw3","2sMTr7y","2r9opp2","2rpK4c8","2rpq1iW","2rAX4Mc","2rBv2Aa","2sbmkft","2rtPXpH","2sfUCOE","2smfZxF","2tLUEvC","2tru5wz","2rXeW98","2s5NLEk","2s1BBB4"];
    const grid = document.getElementById('mainGrid');

    links.forEach((code, i) => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <div class="card-sub">PARA</div>
            <div class="card-title">Number ${i+1}</div>
            <div class="card-num">${i+1}</div>
        `;
        div.onclick = () => playPara(i + 1, code);
        grid.appendChild(div);
    });

    function playPara(num, code) {
        document.getElementById('pTitle').innerText = 'Para ' + (num < 10 ? '0'+num : num);
        const audio = document.getElementById('mainAudio');
        audio.src = 'https://bit.ly/' + code;
        document.getElementById('playerOverlay').style.display = 'flex';
        audio.play();
    }

    function closePlayer() {
        document.getElementById('mainAudio').pause();
        document.getElementById('playerOverlay').style.display = 'none';
    }

    function shareApp() {
        const url = window.location.href;
        const msg = `*Assalamu Alaikum!* ✨\nAl-Quran Pro par 30 Pare ki Tilawat suniye. Design by Mustaqeem.\n🔗 ${url}`;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

</body>
</html>
